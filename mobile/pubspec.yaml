name: utm_bus_tracker
description: "UTM BusTracker - Real-time bus tracking for UTM campus"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Google Maps
  google_maps_flutter: ^2.12.1

  # Geolocation
  geolocator: ^13.0.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4

  # HTTP
  dio: ^5.7.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  firebase_storage: ^12.4.10
  image_picker: ^1.2.2
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
