server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every route serves index.html so React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching — Vite hashes filenames so long-lived caches are safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html — newly deployed bundles must be picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Smaller logs in prod
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;
}
